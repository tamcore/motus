name: E2E Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [regular, oidc]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Add keycloak to /etc/hosts
        if: matrix.mode == 'oidc'
        run: echo "127.0.0.1 keycloak" | sudo tee -a /etc/hosts

      - name: Start app stack
        if: matrix.mode == 'regular'
        run: docker compose -f docker-compose.dev.yaml up -d --build --wait

      - name: Start app stack with OIDC
        if: matrix.mode == 'oidc'
        run: docker compose -f docker-compose.dev.yaml -f docker-compose.oidc.yaml up -d --build --wait

      - name: Show container logs
        if: failure()
        run: |
          docker compose -f docker-compose.dev.yaml logs
          if [ "${{ matrix.mode }}" = "oidc" ]; then
            docker compose -f docker-compose.dev.yaml -f docker-compose.oidc.yaml logs keycloak
          fi

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '24'

      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          # Retention is managed by GitHub Actions cache policy (default: 7 days).
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install frontend deps
        working-directory: ./web
        run: npm ci

      - name: Install Playwright OS dependencies
        working-directory: ./web
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 3
        working-directory: ./web
        run: npx playwright install chromium

      - name: Run E2E tests
        if: matrix.mode == 'regular'
        working-directory: ./web
        run: npx playwright test --project=setup --project=chromium --project=auth

      - name: Run OIDC E2E tests
        if: matrix.mode == 'oidc'
        working-directory: ./web
        run: npx playwright test --project=oidc

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.mode }}
          path: web/playwright-report/
