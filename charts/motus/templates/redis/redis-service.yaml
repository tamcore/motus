{{- if and .Values.redis.enabled .Values.redis.builtin.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "motus.redis.fullname" . }}
  labels:
    {{- include "motus.redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: redis
    name: redis
  selector:
    {{- include "motus.redis.selectorLabels" . | nindent 4 }}
{{- end }}
