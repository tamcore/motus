{{- if and .Values.ai.enabled .Values.ai.apiKey (not .Values.ai.apiKeyRef.secretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "motus.fullname" . }}-ai
  labels:
    {{- include "motus.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ .Values.ai.apiKey | quote }}
{{- end }}
