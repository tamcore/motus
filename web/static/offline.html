<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="theme-color" content="#1a1a1a" />
	<title>Motus - Offline</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
				Oxygen, Ubuntu, Cantarell, sans-serif;
			background-color: #1a1a1a;
			color: #ffffff;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.offline-container {
			text-align: center;
			padding: 2rem;
			max-width: 480px;
		}

		.offline-icon {
			margin-bottom: 1.5rem;
		}

		.offline-icon svg {
			color: #00d4ff;
		}

		h1 {
			font-size: 1.5rem;
			font-weight: 600;
			margin-bottom: 0.75rem;
			color: #ffffff;
		}

		p {
			color: #a0a0a0;
			line-height: 1.6;
			margin-bottom: 1.5rem;
		}

		.retry-button {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
			padding: 0.75rem 1.5rem;
			background-color: #00d4ff;
			color: #1a1a1a;
			border: none;
			border-radius: 0.375rem;
			font-size: 1rem;
			font-weight: 500;
			cursor: pointer;
			transition: background-color 150ms ease;
		}

		.retry-button:hover {
			background-color: #00b8e6;
		}

		.retry-button:active {
			background-color: #009ccc;
		}

		.status-dot {
			width: 8px;
			height: 8px;
			border-radius: 50%;
			background-color: #ff4444;
			display: inline-block;
			animation: pulse 2s infinite;
		}

		.status-bar {
			margin-top: 2rem;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 0.5rem;
			font-size: 0.875rem;
			color: #808080;
		}

		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.4; }
		}
	</style>
</head>
<body>
	<div class="offline-container">
		<div class="offline-icon">
			<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
				<line x1="1" y1="1" x2="23" y2="23"/>
				<path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
				<path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
				<path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
				<path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
				<path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
				<line x1="12" y1="20" x2="12.01" y2="20"/>
			</svg>
		</div>
		<h1>You are offline</h1>
		<p>
			Motus requires a network connection to display real-time tracking data.
			Please check your internet connection and try again.
		</p>
		<button class="retry-button" onclick="window.location.reload()">
			<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
				<polyline points="23 4 23 10 17 10"/>
				<path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
			</svg>
			Try again
		</button>
		<div class="status-bar">
			<span class="status-dot"></span>
			<span>Waiting for connection...</span>
		</div>
	</div>
	<script>
		// Auto-reload when connectivity returns, but verify server is reachable first
		// to avoid a loop on flaky connections where the device is "online" but the server isn't
		window.addEventListener('online', function() {
			fetch('/api/health', { method: 'HEAD' })
				.then(() => window.location.reload())
				.catch(() => { /* server still unreachable, don't reload */ });
		});
	</script>
</body>
</html>
