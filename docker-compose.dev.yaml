x-motus-env: &motus-env
  MOTUS_DATABASE_HOST: db
  MOTUS_DATABASE_PORT: "5432"
  MOTUS_DATABASE_USER: motus
  MOTUS_DATABASE_PASSWORD: motus
  MOTUS_DATABASE_NAME: motus
  MOTUS_DATABASE_SSLMODE: disable
  MOTUS_SERVER_PORT: "8080"
  MOTUS_GPS_H02_PORT: "5013"
  MOTUS_GPS_WATCH_PORT: "5093"
  MOTUS_LOGIN_RATE_LIMIT: "1000"
  MOTUS_API_RATE_LIMIT: "10000"
  MOTUS_ENV: development

x-motus-build: &motus-build
  build:
    context: .
    dockerfile: Dockerfile.dev

services:
  db:
    image: postgis/postgis:16-3.5-alpine
    environment:
      POSTGRES_USER: motus
      POSTGRES_PASSWORD: motus
      POSTGRES_DB: motus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motus -d motus && psql -U motus -d motus -c 'SELECT 1' -q"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  migrate:
    <<: *motus-build
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *motus-env
    command: ["db-migrate"]

  seed:
    <<: *motus-build
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *motus-env
    command: ["user", "add", "--email", "admin@motus.local", "--name", "Admin User", "--password", "admin", "--role", "admin"]

  motus:
    <<: *motus-build
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      <<: *motus-env
    ports:
      - "8080:8080"
      - "5013:5013"
      - "5093:5093"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 30s

volumes:
  pgdata:
