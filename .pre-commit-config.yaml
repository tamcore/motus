repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^charts/.*/templates/
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: go-test
        name: Run Go tests (short mode, skips integration tests)
        entry: go test -short ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-fmt
        name: go fmt
        entry: go fmt ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        types: [go]
        pass_filenames: false

      - id: generate-check
        name: Check generated OAS code is up to date
        entry: bash -c 'make generate && git diff --exit-code internal/api/oas/'
        language: system
        files: ^docs/openapi\.yaml$
        pass_filenames: false
