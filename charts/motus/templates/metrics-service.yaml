{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "motus.fullname" . }}-metrics
  labels:
    {{- include "motus.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.metrics.port }}
    targetPort: metrics
    name: metrics
  selector:
    {{- include "motus.selectorLabels" . | nindent 4 }}
{{- end }}
