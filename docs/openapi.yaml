openapi: "3.0.3"
info:
  title: Motus API
  version: "0.1.0"
  description: GPS tracking and fleet management API

servers:
  - url: /
    description: This server

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_id
      description: Session cookie set after login
    bearerAuth:
      type: http
      scheme: bearer
      description: API key token
    xAuthToken:
      type: apiKey
      in: header
      name: X-Auth-Token
      description: iOS PWA fallback — pass session_id value here

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnexpectedError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "resource not found"

    Device:
      type: object
      required: [id, uniqueId, name, status, disabled, attributes, createdAt, updatedAt]
      properties:
        id: { type: integer, format: int64 }
        uniqueId: { type: string }
        name: { type: string }
        protocol: { type: string }
        status: { type: string }
        speedLimit: { type: number, format: double, nullable: true }
        lastUpdate: { type: string, format: date-time, nullable: true }
        positionId: { type: integer, format: int64, nullable: true }
        groupId: { type: integer, format: int64, nullable: true }
        phone: { type: string, nullable: true }
        model: { type: string, nullable: true }
        contact: { type: string, nullable: true }
        category: { type: string, nullable: true }
        calendarId: { type: integer, format: int64, nullable: true }
        expirationTime: { type: string, format: date-time, nullable: true }
        disabled: { type: boolean }
        mileage: { type: number, format: double, nullable: true }
        attributes:
          $ref: '#/components/schemas/Attributes'
        ownerName: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Attributes:
      type: object
      description: Free-form client attributes passed through unchanged (Traccar compat).
      additionalProperties: true

    PositionAttributes:
      type: object
      description: |
        Protocol-emitted position metadata. Known keys per protocol:
        - All: motion (bool)
        - H02: ignition (bool), flags (string), alarm (string), mcc/mnc/lac/cellId (int), iccid (string)
        - Watch: satellites (int)
        Open for forward compatibility with additional protocols.
      properties:
        motion:     { type: boolean }
        ignition:   { type: boolean }
        flags:      { type: string }
        alarm:      { type: string }
        mcc:        { type: integer }
        mnc:        { type: integer }
        lac:        { type: integer }
        cellId:     { type: integer }
        iccid:      { type: string }
        satellites: { type: integer }
      additionalProperties: true

    AuditMetadata:
      oneOf:
        - $ref: '#/components/schemas/AuditMetaEmpty'
        - $ref: '#/components/schemas/AuditMetaSessionLogin'
        - $ref: '#/components/schemas/AuditMetaSessionLoginFailed'
        - $ref: '#/components/schemas/AuditMetaSessionSudo'
        - $ref: '#/components/schemas/AuditMetaSessionRevoke'
        - $ref: '#/components/schemas/AuditMetaUserCreate'
        - $ref: '#/components/schemas/AuditMetaUserUpdate'
        - $ref: '#/components/schemas/AuditMetaDeviceCreate'
        - $ref: '#/components/schemas/AuditMetaDeviceUpdate'
        - $ref: '#/components/schemas/AuditMetaDeviceAssign'
        - $ref: '#/components/schemas/AuditMetaDeviceGpxImport'
        - $ref: '#/components/schemas/AuditMetaNamedResource'
        - $ref: '#/components/schemas/AuditMetaNotificationRule'
        - $ref: '#/components/schemas/AuditMetaNotifDelivery'
        - $ref: '#/components/schemas/AuditMetaApiKeyCreate'
        - $ref: '#/components/schemas/AuditMetaApiKeyDelete'
        - $ref: '#/components/schemas/AuditMetaShare'
        - $ref: '#/components/schemas/AuditMetaCommandSend'
      discriminator:
        propertyName: action
        mapping:
          session.logout:       '#/components/schemas/AuditMetaEmpty'
          device.delete:        '#/components/schemas/AuditMetaEmpty'
          device.online:        '#/components/schemas/AuditMetaEmpty'
          device.offline:       '#/components/schemas/AuditMetaEmpty'
          notification.delete:  '#/components/schemas/AuditMetaEmpty'
          calendar.delete:      '#/components/schemas/AuditMetaEmpty'
          geofence.delete:      '#/components/schemas/AuditMetaEmpty'
          user.delete:          '#/components/schemas/AuditMetaEmpty'
          session.login:        '#/components/schemas/AuditMetaSessionLogin'
          session.login_failed: '#/components/schemas/AuditMetaSessionLoginFailed'
          session.sudo:         '#/components/schemas/AuditMetaSessionSudo'
          session.sudo_end:     '#/components/schemas/AuditMetaSessionSudo'
          session.revoke:       '#/components/schemas/AuditMetaSessionRevoke'
          user.create:          '#/components/schemas/AuditMetaUserCreate'
          user.update:          '#/components/schemas/AuditMetaUserUpdate'
          device.create:        '#/components/schemas/AuditMetaDeviceCreate'
          device.update:        '#/components/schemas/AuditMetaDeviceUpdate'
          device.assign:        '#/components/schemas/AuditMetaDeviceAssign'
          device.unassign:      '#/components/schemas/AuditMetaDeviceAssign'
          device.gpx_import:    '#/components/schemas/AuditMetaDeviceGpxImport'
          geofence.create:      '#/components/schemas/AuditMetaNamedResource'
          geofence.update:      '#/components/schemas/AuditMetaNamedResource'
          calendar.create:      '#/components/schemas/AuditMetaNamedResource'
          calendar.update:      '#/components/schemas/AuditMetaNamedResource'
          notification.create:  '#/components/schemas/AuditMetaNotificationRule'
          notification.update:  '#/components/schemas/AuditMetaNotificationRule'
          notification.sent:    '#/components/schemas/AuditMetaNotifDelivery'
          notification.failed:  '#/components/schemas/AuditMetaNotifDelivery'
          apikey.create:        '#/components/schemas/AuditMetaApiKeyCreate'
          apikey.delete:        '#/components/schemas/AuditMetaApiKeyDelete'
          share.create:         '#/components/schemas/AuditMetaShare'
          share.delete:         '#/components/schemas/AuditMetaShare'
          command.send:         '#/components/schemas/AuditMetaCommandSend'

    AuditMetaEmpty:
      type: object
      required: [action]
      properties:
        action: { type: string }

    AuditMetaSessionLogin:
      type: object
      required: [action, email]
      properties:
        action: { type: string }
        email: { type: string }

    AuditMetaSessionLoginFailed:
      type: object
      required: [action, email, reason]
      properties:
        action: { type: string }
        email: { type: string }
        reason: { type: string }

    AuditMetaSessionSudo:
      type: object
      required: [action, adminEmail, targetEmail]
      properties:
        action: { type: string }
        adminEmail: { type: string }
        targetEmail: { type: string }

    AuditMetaSessionRevoke:
      type: object
      required: [action]
      properties:
        action: { type: string }
        scope: { type: string }
        revokedSessionId: { type: string }
        sessionOwnerUserId: { type: integer, format: int64 }

    AuditMetaUserCreate:
      type: object
      required: [action, email, role]
      properties:
        action: { type: string }
        email: { type: string }
        role: { type: string }

    AuditMetaUserUpdate:
      type: object
      required: [action, email]
      properties:
        action: { type: string }
        email: { type: string }
        oldEmail: { type: string }
        newEmail: { type: string }
        oldName: { type: string }
        newName: { type: string }
        oldRole: { type: string }
        newRole: { type: string }
        disabled: { type: boolean }
        readonly: { type: boolean }

    AuditMetaDeviceCreate:
      type: object
      required: [action, name, uniqueId]
      properties:
        action: { type: string }
        name: { type: string }
        uniqueId: { type: string }

    AuditMetaDeviceUpdate:
      type: object
      required: [action, name]
      properties:
        action: { type: string }
        name: { type: string }

    AuditMetaDeviceAssign:
      type: object
      required: [action, userId]
      properties:
        action: { type: string }
        userId: { type: integer, format: int64 }

    AuditMetaDeviceGpxImport:
      type: object
      required: [action, deviceId, positions]
      properties:
        action: { type: string }
        deviceId: { type: integer, format: int64 }
        positions: { type: integer }

    AuditMetaNamedResource:
      type: object
      required: [action, name]
      properties:
        action: { type: string }
        name: { type: string }

    AuditMetaNotificationRule:
      type: object
      required: [action, name, channel]
      properties:
        action: { type: string }
        name: { type: string }
        eventTypes:
          type: array
          items: { type: string }
        channel: { type: string }

    AuditMetaNotifDelivery:
      type: object
      required: [action, ruleName, eventType, channel, deviceId]
      properties:
        action: { type: string }
        ruleName: { type: string }
        eventType: { type: string }
        channel: { type: string }
        deviceId: { type: integer, format: int64 }
        responseCode: { type: integer }
        error: { type: string }

    AuditMetaApiKeyCreate:
      type: object
      required: [action, name, permissions]
      properties:
        action: { type: string }
        name: { type: string }
        permissions: { type: string }

    AuditMetaApiKeyDelete:
      type: object
      required: [action, name, keyOwnerUserId]
      properties:
        action: { type: string }
        name: { type: string }
        keyOwnerUserId: { type: integer, format: int64 }

    AuditMetaShare:
      type: object
      required: [action, deviceId]
      properties:
        action: { type: string }
        deviceId: { type: integer, format: int64 }

    AuditMetaCommandSend:
      type: object
      required: [action, commandType, commandStatus, deviceName]
      properties:
        action: { type: string }
        commandType: { type: string }
        commandStatus: { type: string }
        deviceName: { type: string }

    EventAttributes:
      oneOf:
        - $ref: '#/components/schemas/EventAttrEmpty'
        - $ref: '#/components/schemas/EventAttrIgnition'
        - $ref: '#/components/schemas/EventAttrAlarm'
        - $ref: '#/components/schemas/EventAttrMotion'
        - $ref: '#/components/schemas/EventAttrTrip'
        - $ref: '#/components/schemas/EventAttrIdle'
      discriminator:
        propertyName: type
        mapping:
          geofenceEnter: '#/components/schemas/EventAttrEmpty'
          geofenceExit:  '#/components/schemas/EventAttrEmpty'
          ignitionOn:    '#/components/schemas/EventAttrIgnition'
          ignitionOff:   '#/components/schemas/EventAttrIgnition'
          alarm:         '#/components/schemas/EventAttrAlarm'
          motion:        '#/components/schemas/EventAttrMotion'
          tripCompleted: '#/components/schemas/EventAttrTrip'
          deviceIdle:    '#/components/schemas/EventAttrIdle'

    EventAttrEmpty:
      type: object
      required: [type]
      properties:
        type: { type: string }

    EventAttrIgnition:
      type: object
      required: [type, ignition]
      properties:
        type: { type: string }
        ignition: { type: boolean }

    EventAttrAlarm:
      type: object
      required: [type, alarm]
      properties:
        type: { type: string }
        alarm: { type: string }

    EventAttrMotion:
      type: object
      required: [type, speed, previousSpeed]
      properties:
        type: { type: string }
        speed: { type: number, format: double }
        previousSpeed: { type: number, format: double }

    EventAttrTrip:
      type: object
      required: [type, distance, mileage]
      properties:
        type: { type: string }
        distance: { type: number, format: double }
        mileage: { type: number, format: double }

    EventAttrIdle:
      type: object
      required: [type, idleDuration]
      properties:
        type: { type: string }
        idleDuration: { type: number, format: double }

    CommandAttributes:
      oneOf:
        - $ref: '#/components/schemas/CommandAttrCustom'
        - $ref: '#/components/schemas/CommandAttrPositionPeriodic'
        - $ref: '#/components/schemas/CommandAttrSosNumber'
        - $ref: '#/components/schemas/CommandAttrSetSpeedAlarm'
      discriminator:
        propertyName: type
        mapping:
          custom:           '#/components/schemas/CommandAttrCustom'
          positionPeriodic: '#/components/schemas/CommandAttrPositionPeriodic'
          sosNumber:        '#/components/schemas/CommandAttrSosNumber'
          setSpeedAlarm:    '#/components/schemas/CommandAttrSetSpeedAlarm'

    CommandAttrCustom:
      type: object
      required: [type, text]
      properties:
        type: { type: string, enum: [custom] }
        text: { type: string }

    CommandAttrPositionPeriodic:
      type: object
      required: [type, frequency]
      properties:
        type: { type: string, enum: [positionPeriodic] }
        frequency: { type: integer }

    CommandAttrSosNumber:
      type: object
      required: [type, phoneNumber]
      properties:
        type: { type: string, enum: [sosNumber] }
        phoneNumber: { type: string }

    CommandAttrSetSpeedAlarm:
      type: object
      required: [type, speed]
      properties:
        type: { type: string, enum: [setSpeedAlarm] }
        speed: { type: number, format: double }

    NotificationRuleConfig:
      oneOf:
        - $ref: '#/components/schemas/NotificationConfigWebhook'
      discriminator:
        propertyName: channel
        mapping:
          webhook: '#/components/schemas/NotificationConfigWebhook'

    NotificationConfigWebhook:
      type: object
      required: [channel, webhookUrl]
      properties:
        channel:
          type: string
          enum: [webhook]
        webhookUrl:
          type: string
          format: uri
        headers:
          type: object
          additionalProperties:
            type: string

    DeviceInput:
      type: object
      required: [name, uniqueId]
      properties:
        name: { type: string }
        uniqueId: { type: string }
        phone: { type: string }
        model: { type: string }
        contact: { type: string }
        category: { type: string }
        protocol: { type: string }
        calendarId: { type: integer, format: int64, nullable: true }
        speedLimit: { type: number, format: double }
        disabled: { type: boolean }
        attributes:
          $ref: '#/components/schemas/Attributes'

    Position:
      type: object
      required: [id, deviceId, serverTime, deviceTime, fixTime, valid, latitude, longitude, altitude, speed, course, accuracy, attributes, network]
      properties:
        id: { type: integer, format: int64 }
        deviceId: { type: integer, format: int64 }
        deviceName: { type: string }
        type: { type: string }
        protocol: { type: string }
        serverTime: { type: string, format: date-time }
        deviceTime: { type: string, format: date-time }
        fixTime: { type: string, format: date-time }
        outdated: { type: boolean }
        valid: { type: boolean }
        latitude: { type: number, format: double }
        longitude: { type: number, format: double }
        altitude: { type: number, format: double }
        speed: { type: number, format: double }
        course: { type: number, format: double }
        accuracy: { type: number, format: double }
        address: { type: string }
        attributes:
          $ref: '#/components/schemas/PositionAttributes'
        network:
          $ref: '#/components/schemas/Attributes'

    User:
      type: object
      required: [id, email, name, administrator, readonly, disabled, createdAt]
      properties:
        id: { type: integer, format: int64 }
        email: { type: string }
        name: { type: string }
        administrator: { type: boolean }
        readonly: { type: boolean }
        disabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        attributes:
          $ref: '#/components/schemas/Attributes'

    UserInput:
      type: object
      required: [name, email]
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string, format: password }
        role:
          type: string
          enum: [admin, user, readonly]

    Session:
      type: object
      required: [id, userId, rememberMe, createdAt, expiresAt]
      properties:
        id: { type: string, description: "Truncated session ID for display only; never the full cookie value" }
        userId: { type: integer, format: int64 }
        rememberMe: { type: boolean }
        originalUserId: { type: integer, format: int64, nullable: true }
        isSudo: { type: boolean }
        apiKeyId: { type: integer, format: int64, nullable: true }
        apiKeyName: { type: string, nullable: true }
        isCurrent: { type: boolean }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        lastSeenAt: { type: string, format: date-time, nullable: true }
        lastSeenIp: { type: string, nullable: true }
        lastSeenUserAgent: { type: string, nullable: true }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
        remember: { type: boolean }

    TokenResponse:
      type: object
      required: [token]
      properties:
        token: { type: string }

    Command:
      type: object
      required: [id, deviceId, type, status, createdAt]
      properties:
        id: { type: integer, format: int64 }
        deviceId: { type: integer, format: int64 }
        type: { type: string }
        status: { type: string }
        result: { type: string, nullable: true }
        executedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        attributes:
          $ref: '#/components/schemas/CommandAttributes'

    CommandInput:
      type: object
      required: [deviceId, type]
      properties:
        deviceId: { type: integer, format: int64 }
        type: { type: string }
        attributes:
          $ref: '#/components/schemas/CommandAttributes'

    SendCommandRequest:
      type: object
      required: [deviceId, type]
      properties:
        deviceId: { type: integer, format: int64 }
        type: { type: string }
        attributes:
          $ref: '#/components/schemas/CommandAttributes'

    CommandType:
      type: object
      required: [type]
      properties:
        type: { type: string }

    Geofence:
      type: object
      required: [id, name, area, attributes, createdAt, updatedAt]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        description: { type: string }
        area: { type: string, description: "WKT geometry (Traccar-compatible)" }
        geometry: { type: string, description: "GeoJSON geometry" }
        calendarId: { type: integer, format: int64, nullable: true }
        ownerName: { type: string }
        attributes:
          $ref: '#/components/schemas/Attributes'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    GeofenceInput:
      type: object
      required: [name, area]
      properties:
        name: { type: string }
        description: { type: string }
        area: { type: string }
        geometry: { type: string }
        calendarId: { type: integer, format: int64, nullable: true }
        attributes:
          $ref: '#/components/schemas/Attributes'

    GeofenceUpdateInput:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        area: { type: string }
        geometry: { type: string }
        calendarId: { type: integer, format: int64, nullable: true }
        attributes:
          $ref: '#/components/schemas/Attributes'

    Calendar:
      type: object
      required: [id, name, data, createdAt, updatedAt]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        data: { type: string, description: "iCalendar (RFC 5545) data" }
        ownerName: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CalendarInput:
      type: object
      required: [name, data]
      properties:
        name: { type: string }
        data: { type: string }

    CalendarCheckResult:
      type: object
      required: [active]
      properties:
        active: { type: boolean }
        nextTrigger: { type: string, format: date-time, nullable: true }

    Event:
      type: object
      required: [id, deviceId, type, eventTime]
      properties:
        id: { type: integer, format: int64 }
        deviceId: { type: integer, format: int64 }
        geofenceId: { type: integer, format: int64, nullable: true }
        type: { type: string }
        positionId: { type: integer, format: int64, nullable: true }
        eventTime: { type: string, format: date-time }
        attributes:
          $ref: '#/components/schemas/EventAttributes'

    NotificationRule:
      type: object
      required: [id, userId, name, eventTypes, channel, config, template, enabled, createdAt, updatedAt]
      properties:
        id: { type: integer, format: int64 }
        userId: { type: integer, format: int64 }
        name: { type: string }
        eventTypes:
          type: array
          items: { type: string }
        channel: { type: string }
        config:
          $ref: '#/components/schemas/NotificationRuleConfig'
        template: { type: string }
        enabled: { type: boolean }
        ownerName: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    NotificationRuleInput:
      type: object
      required: [name, eventTypes, channel, config]
      properties:
        name: { type: string }
        eventTypes:
          type: array
          items: { type: string }
        channel: { type: string }
        config:
          $ref: '#/components/schemas/NotificationRuleConfig'
        template: { type: string }
        enabled: { type: boolean }

    NotificationLog:
      type: object
      required: [id, ruleId, status]
      properties:
        id: { type: integer, format: int64 }
        ruleId: { type: integer, format: int64 }
        eventId: { type: integer, format: int64, nullable: true }
        status: { type: string }
        sentAt: { type: string, format: date-time, nullable: true }
        error: { type: string }
        responseCode: { type: integer }

    DeviceShare:
      type: object
      required: [id, deviceId, token, createdBy, createdAt]
      properties:
        id: { type: integer, format: int64 }
        deviceId: { type: integer, format: int64 }
        token: { type: string }
        createdBy: { type: integer, format: int64 }
        expiresAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    CreateShareRequest:
      type: object
      properties:
        expiresAt: { type: string, format: date-time }

    ApiKey:
      type: object
      required: [id, userId, name, permissions, createdAt]
      properties:
        id: { type: integer, format: int64 }
        userId: { type: integer, format: int64 }
        token: { type: string, description: "Only present on creation response" }
        name: { type: string }
        permissions:
          type: string
          enum: [full, readonly]
        expiresAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        lastUsedAt: { type: string, format: date-time, nullable: true }

    ApiKeyInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        permissions:
          type: string
          enum: [full, readonly]
          default: full
        expiresAt: { type: string, format: date-time }

    UpdateProfileRequest:
      type: object
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password }

    SudoStatus:
      type: object
      required: [active]
      properties:
        active: { type: boolean }
        originalUserId: { type: integer, format: int64, nullable: true }
        targetUserId: { type: integer, format: int64, nullable: true }

    PlatformStats:
      type: object
      required: [totalUsers, totalDevices, totalPositions, totalEvents, notificationsSent, devicesByStatus, positionsToday, activeUsers]
      properties:
        totalUsers: { type: integer, format: int64 }
        totalDevices: { type: integer, format: int64 }
        totalPositions: { type: integer, format: int64 }
        totalEvents: { type: integer, format: int64 }
        notificationsSent: { type: integer, format: int64 }
        devicesByStatus:
          type: object
          additionalProperties:
            type: integer
            format: int64
        positionsToday: { type: integer, format: int64 }
        activeUsers: { type: integer, format: int64 }

    UserStats:
      type: object
      required: [userId, devicesOwned, totalPositions, eventsTriggered, geofencesOwned]
      properties:
        userId: { type: integer, format: int64 }
        devicesOwned: { type: integer, format: int64 }
        totalPositions: { type: integer, format: int64 }
        lastLogin: { type: string, format: date-time, nullable: true }
        eventsTriggered: { type: integer, format: int64 }
        geofencesOwned: { type: integer, format: int64 }

    AuditEntry:
      type: object
      required: [id, action, userId, createdAt]
      properties:
        id: { type: integer, format: int64 }
        action: { type: string }
        userId: { type: integer, format: int64 }
        userEmail: { type: string }
        resourceType: { type: string }
        resourceId: { type: string }
        metadata:
          $ref: '#/components/schemas/AuditMetadata'
        ipAddress: { type: string }
        createdAt: { type: string, format: date-time }

    AuditPage:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/AuditEntry'
        total: { type: integer, format: int64 }

    OIDCConfig:
      type: object
      required: [enabled]
      properties:
        enabled: { type: boolean }
        issuer: { type: string }

    ServerInfo:
      type: object
      required: [id, registration, readonly, deviceReadonly, limitCommands, version]
      properties:
        id: { type: integer }
        registration: { type: boolean }
        readonly: { type: boolean }
        deviceReadonly: { type: boolean }
        limitCommands: { type: boolean }
        version: { type: string }
        map: { type: string }
        latitude: { type: number, format: double }
        longitude: { type: number, format: double }
        zoom: { type: integer }
        openIdEnabled: { type: boolean }
        openIdForce: { type: boolean }
        attributes:
          $ref: '#/components/schemas/Attributes'
        aiEnabled: { type: boolean }

    VersionInfo:
      type: object
      required: [version]
      properties:
        version: { type: string }
        commit: { type: string }
        buildTime: { type: string }

